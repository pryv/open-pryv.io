# Reference nginx vhost for fronting open-pryv.io
#
# The api-server worker(s) bind a single public port (default 3000 or 443
# with built-in TLS). When `cluster.hfsWorkers > 0`, the same listener
# also fronts HFS via an in-process dispatcher — this is the "quick"
# path that ships out of the box.
#
# For long-term high-throughput installs, put nginx in front of the
# cluster instead. nginx is more efficient at proxying than Node and
# unlocks edge features (rate-limiting, header munging, static assets,
# request inspection). This snippet is the supported pattern.
#
# Topology when nginx is fronting:
#
#   client → nginx :443 (TLS terminate)
#     ├── /<user>/events/<id>/series  → api_backend on 127.0.0.1:4000  (HFS)
#     ├── /<user>/series/batch         → api_backend on 127.0.0.1:4000  (HFS)
#     ├── /socket.io/                  → api_backend on 127.0.0.1:3000  (with Upgrade headers)
#     └── everything else              → api_backend on 127.0.0.1:3000  (api-server)
#
# In this setup:
# - master.js's `http.port` should be 3000 (NOT 443) — nginx owns :443
# - master.js's `letsEncrypt.enabled` typically stays true; the renewer
#   writes the cert to disk via `letsEncrypt.materializeDir` and you
#   point nginx at the same files. Use `letsEncrypt.onRotateScript`
#   (e.g. `nginx -s reload`) to pick up rotations without restart.
# - The in-process HFS dispatcher inside api-server stays active but
#   is bypassed because external traffic doesn't hit it; nginx does the
#   routing before the request reaches api-server. Safe and idempotent.

upstream pryv_api {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream pryv_hfs {
    server 127.0.0.1:4000;
    keepalive 64;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com *.your-domain.com;

    # TLS — point at the cert files materialized by master's
    # letsEncrypt renewer, or at your own certbot output.
    ssl_certificate     /etc/pryv/tls/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/pryv/tls/your-domain.com/privkey.pem;

    # Reasonable modern defaults; tune per your security policy.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ---------- HFS — high-frequency series ----------
    # The two URL families the api-server's in-process dispatcher
    # would have handled. Route them straight to the HFS worker on
    # :4000 instead.

    location ~ ^/[^/]+/events/[^/]+/series {
        proxy_pass http://pryv_hfs;
        proxy_http_version 1.1;
        # IMPORTANT: pass a plain IP:port as Host. The HFS server's
        # subdomainToPath middleware extracts the subdomain from Host
        # and prepends it to the URL — passing a real domain corrupts
        # the route.
        proxy_set_header Host 127.0.0.1:4000;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/[^/]+/series/batch {
        proxy_pass http://pryv_hfs;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:4000;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Socket.IO (api-server) ----------
    # The api-server's own real-time notifications. Keep
    # WebSocket Upgrade headers + long timeouts.

    location /socket.io/ {
        proxy_pass http://pryv_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ---------- Default — api-server ----------
    location / {
        proxy_pass http://pryv_api;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
