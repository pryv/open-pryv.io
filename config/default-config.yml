---
# Unified service-core configuration
# Merged from per-component configs into a single source of truth.
#
# Configuration model (see _plans/27-pre-open-pryv-merge-atwork/CONFIG-SEPARATION.md):
#   - PER-CORE:      local to each node (ports, paths, workers, DB credentials)
#   - PLATFORM-WIDE: MUST be identical across cores in a deployment (policy, schema, identity)
#   - BOOTSTRAP:     platform-wide in meaning but YAML-only because needed before PlatformDB is reachable
#
# Multi-core operators: PlatformDB is authoritative for platform-wide items once seeded.
# Keys below are annotated with their category. Drift warnings are logged on startup.

# === BOOTSTRAP ===
dnsLess:
  isActive: true

reporting:
  templateVersion: '1.0.0'   # BOOTSTRAP

# === PER-CORE: network bind ===
http:
  ip: '127.0.0.1'
  port: 3000
  hfsPort: 4000
  previewsPort: 3001

# === PER-CORE / BOOTSTRAP: storage engines ===
# Engine choice is per-core (flexibility for staging/migration).
# Connection strings and credentials are always per-core.
# `storages.platform.engine` + rqlite settings are BOOTSTRAP — needed before PlatformDB is reachable.
storages:
  base:
    # baseStorage + dataStore. PostgreSQL is the default since Plan 49;
    # Mongo stays fully supported — set `engine: mongodb` in override-config.yml
    # (or `STORAGE_ENGINE=mongodb` in the test harness) to pick it explicitly.
    engine: postgresql
  platform:
    engine: rqlite          # platformStorage
  series:
    engine: influxdb        # seriesStorage
  file:
    engine: filesystem      # fileStorage
  audit:
    engine: sqlite          # auditStorage

  engines:
    mongodb:
      authUser: ''
      authPassword: ''
      host: '127.0.0.1'
      port: 27017
      name: 'pryv-node'
      connectTimeoutMS: 60000
      socketTimeoutMS: 60000
    postgresql:
      host: '127.0.0.1'
      port: 5432
      database: 'pryv-node'
      user: 'pryv'
      password: ''
      max: 20
    sqlite:
      path: 'REPLACE ME'
    filesystem:
      attachmentsDirPath: 'REPLACE ME'
      previewsDirPath: 'REPLACE ME'
    influxdb:
      host: 127.0.0.1
      port: 8086
    rqlite:
      url: http://localhost:4001
      raftPort: 4002                  # Raft consensus port (common across all cores)
      dataDir: var-pryv/rqlite-data   # rqlite data directory (relative to service-core root)
      binPath: var-pryv/rqlite-bin/rqlited  # rqlited binary path
      # tls: null = plain TCP for Raft (single-core / VPN-protected multi-core).
      # To enable mutually-authenticated TLS on the Raft channel, set all of
      # caFile / certFile / keyFile to PEM files on disk. See Plan 34
      # bootstrap bundle for the CLI that issues these automatically.
      tls: null
      # tls:
      #   caFile:   /etc/pryv/tls/ca.crt
      #   certFile: /etc/pryv/tls/node.crt
      #   keyFile:  /etc/pryv/tls/node.key
      #   verifyClient: true           # require mTLS on incoming Raft
      #   verifyServerName: null       # override SAN/CN expected on peers (null = use hostname)

# === PER-CORE: local cache paths and schedules ===
eventFiles:
  previewsCacheMaxAge: 604800000 # 1 week in ms
  previewsCacheCleanUpCronTime: 00 00 2 * * * # every day at 2:00:00AM

# === BOOTSTRAP → PLATFORM-WIDE ===
# Plan 17 Phase 13: seeded into PlatformDB on first boot, then PlatformDB is authoritative.
invitationTokens: null  # null = allow all, [] = block all, ['token1'] = check list

# === MIXED: per-core secrets + platform-wide policy ===
# - `filesReadTokenSecret`, `ssoCookieSignSecret`: PER-CORE secrets (must be identical across cores for cross-core validation).
# - `passwordComplexity*`, `passwordAge*`, `passwordPreventReuseHistoryLength`: PLATFORM-WIDE policy (documented as YAML-only in v2, targeted for post-v2 move to PlatformDB).
# - `adminAccessKey`: BOOTSTRAP, operator-sync responsibility (see CONFIG-SEPARATION.md open question).
auth:
  filesReadTokenSecret: 'REPLACE ME'
  passwordComplexityMinCharCategories: 0
  passwordComplexityMinLength: 0
  passwordAgeMaxDays: 0
  passwordAgeMinDays: 0
  passwordPreventReuseHistoryLength: 0

# === PER-CORE: local plugin code references ===
customExtensions:
  defaultFolder: 'REPLACE ME'
  customAuthStepFn: ''

# === PER-CORE: external service integrations ===
# SMS provider URLs and email provider credentials may legitimately vary per region/deployment.
# MFA `mode` is PLATFORM-WIDE policy — documented as YAML-only in v2, targeted for post-v2 move.
# --- Services (external integrations) ---
services:
  # Multi-factor authentication (Plan 26: merged from service-mfa)
  # mode: disabled — no MFA enforcement (default, backwards-compatible)
  # mode: challenge-verify — separate challenge + verify SMS endpoints
  # mode: single — combined challenge+verify in one SMS endpoint
  mfa:
    mode: disabled
    sms:
      endpoints:
        challenge:
          url: ''
          method: POST
          body: ''
          headers: {}
        verify:
          url: ''
          method: POST
          body: ''
          headers: {}
        single:
          url: ''
          method: POST
          body: ''
          headers: {}
    sessions:
      ttlSeconds: 1800

  # --- Mail delivery (welcome + reset-password) ---
  # `method` picks the transport:
  #   - 'microservice' (legacy): POST to an external service-mail over HTTP.
  #       Back-compat default — existing deployments keep working unchanged.
  #   - 'in-process': run the `mail` component inside the api-server workers.
  #       Templates live in PlatformDB (cluster-wide), SMTP creds stay local YAML.
  # `enabled.*` are independent kill-switches for each message class. When
  # both are false, mailing is off regardless of `method`.
  email:
    enabled:
      welcome: true
      resetPassword: true
    method: microservice
    # --- microservice mode ---
    url: http://127.0.0.1:9000/sendmail/     # external service-mail endpoint
    key: ''                                  # shared Authorization header
    # --- shared between modes ---
    welcomeTemplate: welcome-email
    resetPasswordTemplate: reset-password
    defaultLang: en
    # --- in-process mode only ---
    # Pug source directory to seed into PlatformDB on first boot (when
    # PlatformDB has no templates yet). After seeding, subsequent edits
    # flow through the admin CLI / admin API. Leave empty to rely on the
    # default template set bundled with the mail component.
    templatesRootDir: ''
    smtp:
      host: ''
      port: 587
      secure: false
      auth:
        user: ''
        pass: ''
    from:
      name: ''
      address: ''

# === PER-CORE: debug toggle ===
testNotifications:
  enabled: false

# === PLATFORM-WIDE policy (YAML-only in v2, post-v2 move targeted) ===
updates:
  ignoreProtectedFields: false

# === PER-CORE: local pub/sub broker ===
tcpBroker:
  port: 4222

# === PLATFORM-WIDE policy (YAML-only in v2, post-v2 move targeted) ===
# `minIntervalMs` and `maxRetries` define the user-visible webhook contract.
# `runsSize` is a local buffer — PER-CORE is acceptable.
webhooks:
  minIntervalMs: 5000
  maxRetries: 5
  runsSize: 20

# === PLATFORM-WIDE policy (YAML-only in v2, post-v2 move targeted) ===
versioning:
  forceKeepHistory: false
  deletionMode: 'keep-nothing'

# === PLATFORM-WIDE policy (YAML-only in v2, post-v2 move targeted) ===
user-account:
  delete: # array of entities that can delete a user account
    - 'adminToken' # enable deletion from admin Panel
    #- 'personalToken' # enable self deletion request with a personal token

# === PLATFORM-WIDE schema (CRITICAL — drift corrupts user account data) ===
# `custom.systemStreams` defines the account-field schema. All cores MUST agree.
# Targeted for PlatformDB migration before v2 ships (Plan 27 Phase 2b follow-up).
# `custom.dataStores` lists code plugins — must be identical because the code is identical.
custom:
  systemStreams:
    account:
    - id: email
      isIndexed: true
      isUnique: true
      isShown: true
      isEditable: true
      type: email/string
      name: Email
      isRequiredInValidation: true
  dataStores: []

# === PER-CORE: local cache toggle ===
caching:
  isActive: true

# === PER-CORE: local logs ===
logs:
  console:
    active: false
    level: info
  file:
    active: false
    path: "var-pryv/logs/core.log"
    level: info
    rotation:
      isActive: true
      days: 14

# === PLATFORM-WIDE policy (YAML-only in v2, post-v2 move targeted) ===
uploads:
  maxSizeMb: 50

# === PER-CORE: local tracing toggle ===
trace:
  enable: false

# === PLATFORM-WIDE policy (YAML-only in v2, post-v2 move targeted) ===
# Integrity algorithm drift would break cross-core validation.
integrity:
  isActive:
    attachments: true
    events: true
    accesses: true
  algorithm: sha256

# === PLATFORM-WIDE policy (YAML-only in v2, post-v2 move targeted) ===
accessTracking:
  isActive: true

# === PER-CORE: this node's identity ===
# --- Core identity (multi-core) ---
# Single-core: only core.id needed (default 'single').
# Multi-core: each core has its own id; FQDN = {core.id}.{dns.domain}
core:
  id: single            # core identifier; FQDN = {id}.{dns.domain}
  ip: null              # A record for this core (null = no DNS record)
  ipv6: null            # AAAA record
  cname: null            # CNAME record (used if no ip/ipv6)
  hosting: null          # hosting key this core belongs to (null = default)
  available: true        # false = not accepting new registrations

# === MIXED ===
# `dns.domain` is BOOTSTRAP → PLATFORM-WIDE (seeded from YAML, PlatformDB authoritative after first boot — targeted for v2).
# `dns.active`/`dns.port`/`dns.ip`/`dns.ip6`/`dns.defaultTTL`: PER-CORE (each node decides whether it runs an authoritative DNS server).
# `dns.staticEntries` and `dns.records.root.*`: PER-CORE today; Plan 27 Phase 1 considers moving `staticEntries` to PlatformDB so runtime records replicate.
dns:
  domain: null           # primary domain (e.g. pryv.me); null = dnsLess mode
  active: false          # start DNS server (default off)
  port: 5353             # UDP port (5353 for dev, 53 for prod via Docker mapping)
  ip: '0.0.0.0'         # bind address
  ip6: null              # IPv6 bind address (null = disabled)
  defaultTTL: 300        # TTL in seconds
  staticEntries: {}      # subdomain → { cname: "..." } or { a: [...] } or { txt: [...] }
  # Notes on staticEntries:
  #  - `reg`, `access`, `mfa` are reserved by the distribution — every core
  #    answers those routes directly, so the embedded DNS resolves them to
  #    all available cores' IPs automatically. You do not need to list them
  #    here (any entry is ignored in favour of the auto-resolution).
  #  - Common operator-owned entries to add when present in your deployment:
  #      sw:   { a: ['<core-ip-1>', '<core-ip-2>'] }    # static web / auth UI
  #      mail: { a: ['<core-ip-1>', '<core-ip-2>'] }    # outbound mail target
  #  - Entries here are authoritative — they shadow runtime records set
  #    by the ACME orchestrator or admin API (see drift warning log).
  records:               # root domain records
    root:
      a: []
      aaaa: []
      ns: []
      mx: []
      txt: []
      caa: []
      soa: null

# === PLATFORM-WIDE (targeted for PlatformDB migration before v2) ===
# --- Hostings (regions/zones/providers) ---
# Structure matches legacy /reg/hostings response for backward compatibility.
# In single-core mode, a default hosting is auto-generated.
# Availability bits (`available`, `availableCore`) already live in PlatformDB per Plan 17 Phase 6;
# Plan 27 Phase 2b follow-up should move the hierarchy itself there too.
hostings: null           # null = auto-generate; or { regions: { ... } }

# === PER-CORE: process tuning + bootstrap CLI paths ===
# `ca` and `tokens` paths are only used by the bootstrap CLI (and the matching
# ack endpoint on the issuing core) — see bin/bootstrap.js. Single-core and
# DNSless multi-core deployments can ignore them.
cluster:
  apiWorkers: 2
  hfsWorkers: 1
  previewsWorker: true
  ca:
    path: /etc/pryv/ca                            # cluster CA private key + cert (back this up!)
  tokens:
    path: /var/lib/pryv/bootstrap-tokens.json     # one-time join-token store

# === MIXED ===
# `enabled` + `email` + `atRestKey` are PLATFORM-WIDE (every core must agree);
# `certRenewer` + `tlsDir` + `onRotateScript` are PER-CORE.
# `atRestKey` is operator-sync responsibility — same shape as `auth.adminAccessKey`:
# must be identical across every core, pasted into each override-config.yml.
# Generate with `node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"`.
#
# Hostnames + challenge type (http-01 / dns-01) are DERIVED from the topology
# (dnsLess.publicUrl / core.url / dns.domain) — there is intentionally no
# `letsEncrypt.hostnames` field so the two can't drift.
letsEncrypt:
  enabled: false                                  # feature off by default — existing deployments unchanged
  email: 'REPLACE ME'                             # ACME account contact (required when enabled)
  atRestKey: 'REPLACE ME'                         # base64 of 32 random bytes; encrypts cert + account keys at rest in rqlite
  renewBeforeDays: 30
  staging: false                                  # use Let's Encrypt staging (testing only)
  tlsDir: var-pryv/tls                            # per-hostname dirs live under this root
  certRenewer: false                              # set true on exactly ONE core — typically the cluster CA holder
  onRotateScript: null                            # optional absolute path; invoked after every successful rotation on this core
  directoryUrl: null                              # override to point at Pebble or an internal ACME for testing

# === OBSERVABILITY (optional APM) ===
# Opt-in. When disabled, no provider module is loaded and the façade is a no-op.
# Secrets live in PlatformDB (cluster-wide, AES-256-GCM encrypted via the same
# `AtRestEncryption` module letsEncrypt uses). The CLI `bin/observability.js`
# is the operator-facing way to manage them without editing YAML on every core.
#
# Effective-value rule: if `observability.enabled: false` is set LOCALLY in
# override-config.yml, the local value wins over PlatformDB. This lets an
# operator yank a misbehaving agent without touching cluster state.
observability:
  # `enabled`, `provider`, `appName`, `logLevel`: default unset — PlatformDB
  # is authoritative. Operators who need an emergency local kill-switch can
  # set `observability.enabled: false` in override-config.yml; that always
  # wins over PlatformDB. Conversely, setting `enabled: true` locally is a
  # no-op unless `provider` is also set and a license key is configured.
  newrelic:
    licenseKey: ''                                # if set locally, wins over PlatformDB (emergency override)

# === PER-CORE: schema migrations ===
# Engine-agnostic schema migration runner (see storages/interfaces/migrations/).
# When true, master.js applies pending migrations against each migration-capable
# engine before forking workers. Set false to operate migrations manually via
# `node bin/migrate.js`.
migrations:
  autoRunOnStart: true

# === MIXED ===
# `audit.active` is PLATFORM-WIDE policy; `audit.storage`/`audit.syslog` contain per-core sinks.
# --- Audit ---
audit:
  active: true
  storage:
    filter:
      methods:
        include: ['all']
        exclude: []

  syslog:
    options:
      host: localhost
      #port: 514
      protocol: unix
      #path: /dev/log # set by config/default-path.js
      localhost: ''
      app_name: pryv-audit

    formats:
      default:
        template: "{userid} {type} createdBy:{createdBy} {streamIds} {content}"
        level: notice
    filter:
      methods:
        include: ['all']
        exclude: []

